name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install clang-format
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format
      - name: Run clang-format
        run: make format-check

  build-test:
    name: Build + tests (${{ matrix.os }} / ${{ matrix.cc }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, cc: clang }
          - { os: ubuntu-latest, cc: gcc }
          - { os: macos-latest,  cc: clang }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang gcc make

      # macOS runners already ship clang + make; nothing to install.

      - name: Build library
        run: make CC=${{ matrix.cc }}

      - name: Build tests
        run: make CC=${{ matrix.cc }} tests

      - name: Run tests
        run: scripts/run-tests.sh

      - name: Upload test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-log-${{ matrix.os }}-${{ matrix.cc }}
          path: build/test.log
          if-no-files-found: ignore

  sanitize:
    name: ASan + UBSan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install clang
        run: |
          sudo apt-get update
          sudo apt-get install -y clang
      - name: Build + run tests under ASan/UBSan
        run: make CC=clang test-asan
      - name: Upload sanitizer log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-log-asan
          path: build/test.log
          if-no-files-found: ignore

  fuzz-smoke:
    name: Fuzz smoke (30s per target)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install clang
        run: |
          sudo apt-get update
          sudo apt-get install -y clang
      - name: Build fuzz harnesses (also runs gen-seeds)
        run: make CC=clang fuzz
      - name: Run each fuzz target for 30s
        run: scripts/run-fuzz.sh 30
      - name: Upload corpora + any crash artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-artifacts
          path: |
            tests/fuzz/corpus_*
            crash-*
            leak-*
            timeout-*
          if-no-files-found: ignore

  docs:
    name: Docs build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install docs dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y doxygen python3-venv
      - name: Build Sphinx + Doxygen
        run: make docs
      - name: Upload HTML docs
        uses: actions/upload-artifact@v4
        with:
          name: docs-html
          path: build/docs/html
          if-no-files-found: ignore
