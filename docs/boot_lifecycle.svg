<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 940" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1f2937"/>
    </marker>
    <marker id="arr-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1e40af"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#166534"/>
    </marker>
    <marker id="arr-amber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#92400e"/>
    </marker>
    <pattern id="grid2" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#f1f5f9" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1000" height="940" fill="#fafaf9"/>
  <rect width="1000" height="940" fill="url(#grid2)"/>

  <!-- Title -->
  <rect x="0" y="0" width="1000" height="38" fill="#0f172a"/>
  <text x="20" y="24" font-size="13" font-weight="700" fill="#fafaf9" letter-spacing="2">DEVICE BOOT LIFECYCLE</text>
  <text x="980" y="24" font-size="11" font-weight="500" fill="#94a3b8" text-anchor="end" letter-spacing="1">SCHEMA LOAD → CONFIG LOAD → RUNTIME</text>

  <!-- ====== SHARED INIT (top section) ====== -->
  <text x="40" y="68" font-size="10" font-weight="700" fill="#475569" letter-spacing="2">PHASE 1 · SHARED INIT</text>
  <line x1="40" y1="74" x2="960" y2="74" stroke="#cbd5e1" stroke-width="1"/>

  <!-- Firmware image source -->
  <g>
    <rect x="320" y="90" width="360" height="60" rx="4" fill="#f1f5f9" stroke="#1f2937" stroke-width="2"/>
    <text x="500" y="115" font-size="13" font-weight="700" fill="#0f172a" text-anchor="middle">Firmware image</text>
    <text x="500" y="135" font-size="11" fill="#475569" text-anchor="middle">contains schema blob (possibly compressed)</text>
  </g>

  <line x1="500" y1="152" x2="500" y2="180" stroke="#1f2937" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Decompress (conditional) -->
  <g>
    <rect x="320" y="184" width="360" height="68" rx="4" fill="#dbeafe" stroke="#1f2937" stroke-width="2" stroke-dasharray="5 3"/>
    <text x="500" y="208" font-size="12" font-weight="700" fill="#0f172a" text-anchor="middle">Decompress schema (if compressed)</text>
    <text x="500" y="226" font-size="10" fill="#1e3a8a" text-anchor="middle" font-style="italic">LZ4_decompress_safe() · heatshrink directly</text>
    <text x="500" y="242" font-size="10" fill="#991b1b" text-anchor="middle">NOT cfgpack_pagein_lz4()</text>
  </g>

  <line x1="500" y1="254" x2="500" y2="282" stroke="#1f2937" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Init calls -->
  <g>
    <rect x="280" y="286" width="440" height="100" rx="4" fill="#ffffff" stroke="#1f2937" stroke-width="2"/>
    <text x="500" y="307" font-size="11" font-weight="700" fill="#475569" text-anchor="middle" letter-spacing="1">SCHEMA PARSE &amp; CONTEXT INIT</text>
    <line x1="298" y1="316" x2="702" y2="316" stroke="#cbd5e1" stroke-width="1"/>
    <text x="296" y="335" font-size="11" fill="#0f172a" font-family="ui-monospace, monospace">cfgpack_schema_measure_msgpack()</text>
    <text x="710" y="335" font-size="9" fill="#64748b" text-anchor="end" font-style="italic">measure buffer sizes</text>
    <text x="296" y="355" font-size="11" fill="#0f172a" font-family="ui-monospace, monospace">cfgpack_schema_parse_msgpack()</text>
    <text x="710" y="355" font-size="9" fill="#64748b" text-anchor="end" font-style="italic">parse schema</text>
    <text x="296" y="375" font-size="11" fill="#0f172a" font-family="ui-monospace, monospace">cfgpack_init()</text>
    <text x="710" y="375" font-size="9" fill="#64748b" text-anchor="end" font-style="italic">context ready, defaults set</text>
  </g>

  <!-- Branch indicator -->
  <line x1="500" y1="388" x2="500" y2="412" stroke="#1f2937" stroke-width="2"/>
  <text x="510" y="406" font-size="10" fill="#475569" font-style="italic">three paths →</text>

  <!-- Trunk for branching -->
  <line x1="170" y1="412" x2="830" y2="412" stroke="#1f2937" stroke-width="2"/>
  <line x1="170" y1="412" x2="170" y2="438" stroke="#166534" stroke-width="2" marker-end="url(#arr-green)"/>
  <line x1="500" y1="412" x2="500" y2="438" stroke="#1e40af" stroke-width="2" marker-end="url(#arr-blue)"/>
  <line x1="830" y1="412" x2="830" y2="438" stroke="#92400e" stroke-width="2" marker-end="url(#arr-amber)"/>

  <!-- ====== PHASE 2 BRANCHES ====== -->
  <text x="40" y="464" font-size="10" font-weight="700" fill="#475569" letter-spacing="2">PHASE 2 · LOAD CONFIG</text>
  <line x1="40" y1="470" x2="960" y2="470" stroke="#cbd5e1" stroke-width="1"/>

  <!-- ===== BRANCH 1: First boot ===== -->
  <g>
    <rect x="40" y="486" width="260" height="32" fill="#dcfce7" stroke="#166534" stroke-width="2"/>
    <circle cx="60" cy="502" r="9" fill="#166534"/>
    <text x="60" y="506" font-size="12" font-weight="700" fill="#fafaf9" text-anchor="middle">1</text>
    <text x="80" y="507" font-size="13" font-weight="700" fill="#166534">FIRST BOOT</text>
  </g>
  <g>
    <rect x="40" y="525" width="260" height="200" rx="4" fill="#ffffff" stroke="#166534" stroke-width="2"/>
    <text x="55" y="550" font-size="11" fill="#0f172a" font-weight="700">No flash blob present.</text>
    <text x="55" y="572" font-size="11" fill="#334155">Entries with schema</text>
    <text x="55" y="586" font-size="11" fill="#334155">defaults are auto-marked</text>
    <text x="55" y="600" font-size="11" fill="#334155">present.</text>
    <text x="55" y="624" font-size="10" fill="#475569" font-style="italic">No pagein call needed.</text>
    <text x="55" y="640" font-size="10" fill="#475569" font-style="italic">CRC not involved.</text>
    <line x1="55" y1="656" x2="285" y2="656" stroke="#cbd5e1" stroke-width="1"/>
    <text x="55" y="676" font-size="10" font-weight="700" fill="#166534" letter-spacing="1">RESULT</text>
    <text x="55" y="694" font-size="11" fill="#0f172a">App runs with defaults;</text>
    <text x="55" y="708" font-size="11" fill="#0f172a">later persists changes.</text>
  </g>

  <!-- ===== BRANCH 2: Same version ===== -->
  <g>
    <rect x="370" y="486" width="260" height="32" fill="#dbeafe" stroke="#1e40af" stroke-width="2"/>
    <circle cx="390" cy="502" r="9" fill="#1e40af"/>
    <text x="390" y="506" font-size="12" font-weight="700" fill="#fafaf9" text-anchor="middle">2</text>
    <text x="410" y="507" font-size="13" font-weight="700" fill="#1e40af">SAME-VERSION BOOT</text>
  </g>
  <g>
    <rect x="370" y="525" width="260" height="200" rx="4" fill="#ffffff" stroke="#1e40af" stroke-width="2"/>
    <text x="385" y="558" font-size="11" fill="#0f172a" font-family="ui-monospace, monospace">cfgpack_pagein_buf()</text>
    <text x="385" y="586" font-size="11" fill="#334155">Loads previously written</text>
    <text x="385" y="600" font-size="11" fill="#334155">config blob from flash.</text>
    <text x="385" y="624" font-size="11" fill="#0f172a" font-weight="700">CRC-32C verified.</text>
    <text x="385" y="644" font-size="10" fill="#991b1b" font-style="italic">If corrupt → CFGPACK_ERR_CRC,</text>
    <text x="385" y="658" font-size="10" fill="#991b1b" font-style="italic">app falls back to defaults.</text>
    <line x1="385" y1="674" x2="615" y2="674" stroke="#cbd5e1" stroke-width="1"/>
    <text x="385" y="694" font-size="10" font-weight="700" fill="#1e40af" letter-spacing="1">RESULT</text>
    <text x="385" y="712" font-size="11" fill="#0f172a">Saved values restored.</text>
  </g>

  <!-- ===== BRANCH 3: Upgrade ===== -->
  <g>
    <rect x="700" y="486" width="260" height="32" fill="#fef3c7" stroke="#92400e" stroke-width="2"/>
    <circle cx="720" cy="502" r="9" fill="#92400e"/>
    <text x="720" y="506" font-size="12" font-weight="700" fill="#fafaf9" text-anchor="middle">3</text>
    <text x="740" y="507" font-size="13" font-weight="700" fill="#92400e">FIRMWARE UPGRADE</text>
  </g>
  <g>
    <rect x="700" y="525" width="260" height="200" rx="4" fill="#ffffff" stroke="#92400e" stroke-width="2"/>
    <text x="713" y="548" font-size="10" font-weight="700" fill="#92400e">STEP 1</text>
    <text x="713" y="564" font-size="10" fill="#0f172a" font-family="ui-monospace, monospace">cfgpack_peek_name()</text>
    <text x="713" y="577" font-size="9" fill="#64748b" font-style="italic">read old version from flash</text>
    <text x="713" y="598" font-size="10" font-weight="700" fill="#92400e">STEP 2</text>
    <text x="713" y="614" font-size="10" fill="#334155">Select matching remap table</text>
    <text x="713" y="635" font-size="10" font-weight="700" fill="#92400e">STEP 3</text>
    <text x="713" y="651" font-size="10" fill="#0f172a" font-family="ui-monospace, monospace">cfgpack_pagein_remap()</text>
    <text x="713" y="664" font-size="9" fill="#64748b" font-style="italic">load + translate indices</text>
    <line x1="713" y1="676" x2="945" y2="676" stroke="#cbd5e1" stroke-width="1"/>
    <text x="713" y="691" font-size="10" font-weight="700" fill="#92400e" letter-spacing="1">RESULT</text>
    <text x="713" y="706" font-size="11" fill="#0f172a">Old values migrated;</text>
    <text x="713" y="719" font-size="9" fill="#64748b" font-style="italic">u8→u16 widening auto</text>
  </g>

  <!-- ===== CONVERGE TO RUNTIME ===== -->
  <line x1="170" y1="725" x2="170" y2="755" stroke="#166534" stroke-width="2"/>
  <line x1="500" y1="725" x2="500" y2="755" stroke="#1e40af" stroke-width="2"/>
  <line x1="830" y1="725" x2="830" y2="755" stroke="#92400e" stroke-width="2"/>
  <line x1="170" y1="755" x2="830" y2="755" stroke="#1f2937" stroke-width="2"/>
  <line x1="500" y1="755" x2="500" y2="783" stroke="#1f2937" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Phase 3 header -->
  <text x="40" y="785" font-size="10" font-weight="700" fill="#475569" letter-spacing="2">PHASE 3 · RUNTIME</text>
  <line x1="40" y1="791" x2="960" y2="791" stroke="#cbd5e1" stroke-width="1"/>

  <!-- Runtime block: x=280..720, y=808..852 -->
  <g>
    <rect x="280" y="808" width="440" height="44" rx="4" fill="#0f172a"/>
    <text x="500" y="835" font-size="13" font-weight="700" fill="#fafaf9" text-anchor="middle" letter-spacing="1">CONFIG LOADED — APPLICATION RUNNING</text>
  </g>

  <!-- Pageout self-loop: exits right edge of runtime block, U-shape, returns to bottom edge -->
  <!-- Runtime box: x=280..720, y=808..852 -->
  <!-- Exit point: (720, 830) on right edge; Return point: (550, 852) on bottom edge -->
  <path d="M 720 830 L 800 830 Q 820 830 820 850 L 820 895 Q 820 910 805 910 L 565 910 Q 550 910 550 895 L 550 858"
        fill="none" stroke="#1f2937" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arr)"/>

  <!-- Loop label: placed in clear area below the runtime block, well clear of the path -->
  <text x="350" y="900" font-size="10" fill="#0f172a" font-family="ui-monospace, monospace">cfgpack_pageout()</text>
  <text x="350" y="915" font-size="9" fill="#64748b" font-style="italic">on change → write blob + CRC to flash</text>
</svg>
