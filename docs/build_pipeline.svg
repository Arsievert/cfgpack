<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 380" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1f2937"/>
    </marker>
    <marker id="arrow-dashed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6b7280"/>
    </marker>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#f1f5f9" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="880" height="380" fill="#fafaf9"/>
  <rect width="880" height="380" fill="url(#grid)"/>

  <!-- Title strip -->
  <rect x="0" y="0" width="880" height="38" fill="#0f172a"/>
  <text x="20" y="24" font-size="13" font-weight="700" fill="#fafaf9" letter-spacing="2">BUILD-TIME PIPELINE</text>
  <text x="860" y="24" font-size="11" font-weight="500" fill="#94a3b8" text-anchor="end" letter-spacing="1">SCHEMA BLOB PRODUCTION</text>

  <!-- Stage 1: Source -->
  <g>
    <rect x="40" y="130" width="180" height="110" rx="4" fill="#ffffff" stroke="#1f2937" stroke-width="2"/>
    <rect x="40" y="130" width="180" height="22" rx="4" fill="#1f2937"/>
    <rect x="40" y="146" width="180" height="6" fill="#1f2937"/>
    <text x="50" y="146" font-size="10" font-weight="700" fill="#fafaf9" letter-spacing="1">SOURCE</text>
    <text x="130" y="183" font-size="14" font-weight="700" fill="#0f172a" text-anchor="middle">vehicle.map</text>
    <text x="130" y="205" font-size="11" fill="#475569" text-anchor="middle">human-readable</text>
    <text x="130" y="220" font-size="11" fill="#475569" text-anchor="middle">text definition</text>
  </g>

  <!-- Arrow 1 -->
  <line x1="225" y1="185" x2="295" y2="185" stroke="#1f2937" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Stage 2: Pack tool -->
  <g>
    <rect x="300" y="130" width="220" height="110" rx="4" fill="#fef3c7" stroke="#1f2937" stroke-width="2"/>
    <rect x="300" y="130" width="220" height="22" rx="4" fill="#1f2937"/>
    <rect x="300" y="146" width="220" height="6" fill="#1f2937"/>
    <text x="310" y="146" font-size="10" font-weight="700" fill="#fafaf9" letter-spacing="1">TOOL · PACK</text>
    <text x="410" y="178" font-size="13" font-weight="700" fill="#0f172a" text-anchor="middle">cfgpack-schema-pack</text>
    <text x="410" y="198" font-size="10" fill="#475569" text-anchor="middle" font-style="italic">schema_write_msgpack()</text>
    <text x="410" y="222" font-size="10" fill="#92400e" text-anchor="middle">text → compact binary</text>
  </g>

  <!-- Arrow 2 -->
  <line x1="525" y1="185" x2="595" y2="185" stroke="#1f2937" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Stage 3: Packed output -->
  <g>
    <rect x="600" y="130" width="200" height="110" rx="4" fill="#ffffff" stroke="#1f2937" stroke-width="2"/>
    <rect x="600" y="130" width="200" height="22" rx="4" fill="#1f2937"/>
    <rect x="600" y="146" width="200" height="6" fill="#1f2937"/>
    <text x="610" y="146" font-size="10" font-weight="700" fill="#fafaf9" letter-spacing="1">SCHEMA BLOB</text>
    <text x="700" y="180" font-size="13" font-weight="700" fill="#0f172a" text-anchor="middle">vehicle.msgpack</text>
    <text x="700" y="202" font-size="11" fill="#475569" text-anchor="middle">no CRC</text>
    <text x="700" y="218" font-size="11" fill="#475569" text-anchor="middle">structure, not values</text>
  </g>

  <!-- Optional path label + arrow down -->
  <line x1="700" y1="245" x2="700" y2="288" stroke="#6b7280" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrow-dashed)"/>
  <text x="715" y="270" font-size="10" font-style="italic" fill="#6b7280">optional</text>

  <!-- Stage 4: Compress tool (offset down) -->
  <g>
    <rect x="450" y="290" width="220" height="70" rx="4" fill="#dbeafe" stroke="#1f2937" stroke-width="2" stroke-dasharray="5 3"/>
    <rect x="450" y="290" width="220" height="22" rx="4" fill="#1f2937"/>
    <rect x="450" y="306" width="220" height="6" fill="#1f2937"/>
    <text x="460" y="306" font-size="10" font-weight="700" fill="#fafaf9" letter-spacing="1">TOOL · COMPRESS</text>
    <text x="560" y="338" font-size="13" font-weight="700" fill="#0f172a" text-anchor="middle">cfgpack-compress</text>
    <text x="560" y="354" font-size="10" fill="#1e3a8a" text-anchor="middle">lz4 · heatshrink</text>
  </g>

  <!-- Arrow from packed to compress (curved) -->
  <path d="M 700 288 Q 700 295 670 320" fill="none" stroke="#6b7280" stroke-width="1.5" stroke-dasharray="4 3"/>

  <!-- Stage 5: Compressed output -->
  <g>
    <rect x="40" y="290" width="220" height="70" rx="4" fill="#ffffff" stroke="#1f2937" stroke-width="2" stroke-dasharray="5 3"/>
    <rect x="40" y="290" width="220" height="22" rx="4" fill="#1f2937"/>
    <rect x="40" y="306" width="220" height="6" fill="#1f2937"/>
    <text x="50" y="306" font-size="10" font-weight="700" fill="#fafaf9" letter-spacing="1">SCHEMA BLOB · COMPRESSED</text>
    <text x="150" y="338" font-size="13" font-weight="700" fill="#0f172a" text-anchor="middle">vehicle.msgpack.lz4</text>
    <text x="150" y="354" font-size="10" fill="#475569" text-anchor="middle">smaller, still describes structure</text>
  </g>

  <!-- Arrow from compress tool to compressed file -->
  <line x1="445" y1="325" x2="270" y2="325" stroke="#1f2937" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Footer note -->
  <text x="440" y="92" font-size="11" fill="#475569" text-anchor="middle" font-style="italic">
    Both outputs are <tspan font-weight="700" fill="#0f172a" font-style="normal">schema blobs</tspan> — they describe the config structure, not runtime values.
  </text>
</svg>
